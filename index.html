<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LED HORIZONTAL MARKET TICKER</title>

<style>

body{
    margin:0;
    background:#000;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

.led-board{
    width:100vw;
    height:120px;
    background:#000;
    overflow:hidden;
    display:flex;
    align-items:center;
    border-top:2px solid #111;
    border-bottom:2px solid #111;
}

.ticker{
    display:inline-block;
    white-space:nowrap;
    padding-left:100%;
    animation:scroll 45s linear infinite;
}

.item{
    display:inline-flex;
    align-items:center;
    margin-right:100px;
    font-size:48px;
    font-weight:bold;
}

.logo{
    width:50px;
    height:50px;
    margin-right:15px;
    border-radius:50%;
    background:#111;
}

.symbol{
    color:#ffffff;
    margin-right:12px;
}

.price-up{
    color:#00ff66;
}

.price-down{
    color:#ff3333;
}

@keyframes scroll{

0%{
    transform:translateX(0);
}

100%{
    transform:translateX(-100%);
}

}

</style>
</head>

<body>

<div class="led-board">

<div class="ticker" id="ticker">

<div class="item">
<img class="logo" src="https://s3-symbol-logo.tradingview.com/metal/gold.svg">
<span class="symbol">XAUUSD</span>
<span class="price-up" id="gold">Loading...</span>
</div>

<div class="item">
<img class="logo" src="https://s3-symbol-logo.tradingview.com/metal/silver.svg">
<span class="symbol">SILVER</span>
<span class="price-up" id="silver">Loading...</span>
</div>

<div class="item">
<img class="logo" src="https://s3-symbol-logo.tradingview.com/crypto/XTVCBTC.svg">
<span class="symbol">BTCUSD</span>
<span class="price-up" id="btc">Loading...</span>
</div>

<div class="item">
<img class="logo" src="https://s3-symbol-logo.tradingview.com/country/US.svg">
<span class="symbol">EURUSD</span>
<span class="price-up" id="eurusd">Loading...</span>
</div>

<div class="item">
<img class="logo" src="https://s3-symbol-logo.tradingview.com/country/GB.svg">
<span class="symbol">GBPUSD</span>
<span class="price-down" id="gbpusd">Loading...</span>
</div>

<div class="item">
<img class="logo" src="https://s3-symbol-logo.tradingview.com/country/JP.svg">
<span class="symbol">USDJPY</span>
<span class="price-up" id="usdjpy">Loading...</span>
</div>

<div class="item">
<img class="logo" src="https://s3-symbol-logo.tradingview.com/energy/oil.svg">
<span class="symbol">OIL</span>
<span class="price-down">74.22</span>
</div>

</div>

</div>

<script>

const API_KEY = "ab9ad4a5484e41feb2e148d8322fe4b5";
// Replace with your TwelveData API Key

async function loadPrices(){

try{

const url =
"https://api.twelvedata.com/price?symbol=XAU/USD,XAG/USD,EUR/USD,GBP/USD,USD/JPY,BTC/USD&apikey=" + API_KEY;

const response = await fetch(url);

const data = await response.json();

if(data["XAU/USD"]){
document.getElementById("gold").innerHTML =
parseFloat(data["XAU/USD"].price).toFixed(2);
}

if(data["XAG/USD"]){
document.getElementById("silver").innerHTML =
parseFloat(data["XAG/USD"].price).toFixed(2);
}

if(data["BTC/USD"]){
document.getElementById("btc").innerHTML =
parseFloat(data["BTC/USD"].price).toFixed(0);
}

if(data["EUR/USD"]){
document.getElementById("eurusd").innerHTML =
parseFloat(data["EUR/USD"].price).toFixed(5);
}

if(data["GBP/USD"]){
document.getElementById("gbpusd").innerHTML =
parseFloat(data["GBP/USD"].price).toFixed(5);
}

if(data["USD/JPY"]){
document.getElementById("usdjpy").innerHTML =
parseFloat(data["USD/JPY"].price).toFixed(3);
}

}catch(error){

console.log(error);

}

}

loadPrices();

setInterval(loadPrices,5000);

</script>

</body>
</html>
