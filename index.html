<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP TRADING WALL PRO</title>

<style>

body{
    margin:0;
    background:#000;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* ===== TOP LED BOARD ===== */
.led-board{
    width:100%;
    height:120px;
    background:#000;
    border-top:2px solid #111;
    border-bottom:2px solid #111;
    display:flex;
    align-items:center;
    overflow:hidden;
}

/* scrolling strip */
.ticker-wrap{
    display:flex;
    width:max-content;
    animation:scroll 25s linear infinite;
}

.ticker{
    display:flex;
}

/* ITEM */
.item{
    display:flex;
    align-items:center;
    margin-right:90px;
    font-size:44px;
    font-weight:bold;
    letter-spacing:1px;
    white-space:nowrap;
}

/* ICON */
.logo{
    width:48px;
    height:48px;
    margin-right:14px;
}

/* SYMBOL */
.symbol{
    color:#fff;
    margin-right:14px;
}

/* PRICE */
.price{
    color:#00ff66;
    text-shadow:0 0 12px #00ff66;
    transition:0.3s;
}

/* BLINK EFFECT */
.up{
    color:#00ff66;
    animation:blinkUp 0.6s 1;
}

.down{
    color:#ff3b3b;
    animation:blinkDown 0.6s 1;
}

@keyframes blinkUp{
    0%{opacity:0.2;}
    100%{opacity:1;}
}

@keyframes blinkDown{
    0%{opacity:0.2;}
    100%{opacity:1;}
}

/* SCROLL */
@keyframes scroll{
    0%{transform:translateX(0);}
    100%{transform:translateX(-50%);}
}

/* ===== NEWS BAR ===== */
.news-bar{
    position:absolute;
    bottom:0;
    width:100%;
    height:60px;
    background:#0a0a0a;
    border-top:1px solid #222;
}

</style>
</head>

<body>

<!-- ===== LED TICKER ===== -->
<div class="led-board">

    <div class="ticker-wrap">

        <div class="ticker" id="ticker1"></div>
        <div class="ticker" id="ticker2"></div>

    </div>

</div>

<!-- ===== NEWS BAR (TRADINGVIEW) ===== -->
<div class="news-bar">

<!-- TradingView News Widget -->
<script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js">
{
  "feedMode": "all_symbols",
  "isTransparent": true,
  "displayMode": "compact",
  "width": "100%",
  "height": 60,
  "colorTheme": "dark",
  "locale": "en"
}
</script>

</div>

<!-- ===== TRADING VIEW TICKER (REAL PRICES) ===== -->
<script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js">
{
  "symbols": [
    {"proName":"OANDA:XAUUSD","title":"GOLD"},
    {"proName":"OANDA:XAGUSD","title":"SILVER"},
    {"proName":"NASDAQ:NDX","title":"NASDAQ"},
    {"proName":"FOREXCOM:US30","title":"US30"},
    {"proName":"FX:EURUSD","title":"EURUSD"},
    {"proName":"FX:GBPUSD","title":"GBPUSD"},
    {"proName":"FX:USDJPY","title":"USDJPY"},
    {"proName":"BITSTAMP:BTCUSD","title":"BTCUSD"},
    {"proName":"TVC:USOIL","title":"OIL"}
  ],
  "showSymbolLogo": true,
  "colorTheme": "dark",
  "isTransparent": true,
  "displayMode": "adaptive",
  "locale": "en"
}
</script>

</body>
</html>
