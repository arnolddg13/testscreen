<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>LIVE MARKET TICKER</title>

<style>

body{
    margin:0;
    background:#000;
    overflow:hidden;
    font-family:Arial;
}

.ticker-wrap{
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    overflow:hidden;
}

.ticker{
    display:flex;
    white-space:nowrap;
    animation:scroll 35s linear infinite;
}

.item{
    display:flex;
    align-items:center;
    margin-right:120px;
    font-size:42px;
    font-weight:bold;
}

.symbol{
    color:#ffffff;
    margin-right:20px;
}

.price{
    color:#00ff66;
    animation:blink 1s infinite;
}

.down{
    color:#ff3333;
}

@keyframes scroll{
    0%{transform:translateX(100%);}
    100%{transform:translateX(-100%);}
}

@keyframes blink{
    50%{opacity:0.5;}
}

</style>
</head>

<body>

<div class="ticker-wrap">
    <div class="ticker" id="ticker"></div>
</div>

<script>

const symbols = [
    {name:"BTCUSDT", label:"BTC"},
    {name:"ETHUSDT", label:"ETH"},
    {name:"XRPUSDT", label:"XRP"},
    {name:"BNBUSDT", label:"BNB"},
    {name:"EURUSDT", label:"EUR/USD"},
    {name:"JPYUSDT", label:"USD/JPY"}
];

async function loadPrices(){

    let html = "";

    for(let s of symbols){

        try{

            const res = await fetch(
                `https://api.binance.com/api/v3/ticker/price?symbol=${s.name}`
            );

            const data = await res.json();

            html += `
            <div class="item">
                <div class="symbol">${s.label}</div>
                <div class="price">${parseFloat(data.price).toFixed(2)}</div>
            </div>
            `;

        }catch(e){

            html += `
            <div class="item">
                <div class="symbol">${s.label}</div>
                <div class="price down">ERROR</div>
            </div>
            `;
        }
    }

    document.getElementById("ticker").innerHTML = html;
}

loadPrices();

setInterval(loadPrices,3000);

</script>

</body>
</html>
