<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trading Wall</title>

<style>

body{
    margin:0;
    background:#000;
    overflow:hidden;
}

.led-board{
    width:100%;
    height:90px;
    background:#000;
}

.ticker{
    width:100%;
    height:90px;
}

</style>
</head>

<body>

<div class="led-board">

<div class="ticker">

<div class="tradingview-widget-container">

<div class="tradingview-widget-container__widget"></div>

<script
type="text/javascript"
src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js"
async>
{
  "symbols": [
    {
      "proName": "OANDA:XAUUSD",
      "title": "GOLD"
    },
    {
      "proName": "OANDA:XAGUSD",
      "title": "SILVER"
    },
    {
      "proName": "BINANCE:BTCUSDT",
      "title": "BTC"
    },
    {
      "proName": "FX:EURUSD",
      "title": "EUR/USD"
    },
    {
      "proName": "FX:GBPUSD",
      "title": "GBP/USD"
    },
    {
      "proName": "FX:USDJPY",
      "title": "USD/JPY"
    },
    {
      "proName": "TVC:USOIL",
      "title": "OIL"
    }
  ],
  "showSymbolLogo": true,
  "isTransparent": true,
  "displayMode": "regular",
  "colorTheme": "dark",
  "locale": "en"
}
</script>

</div>

</div>

</div>

</body>
</html>
