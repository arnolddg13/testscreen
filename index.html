<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIPLEX LIVE MARKET TICKER</title>

<style>

body{
    margin:0;
    background:#000;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

.ticker-wrap{
    width:100%;
    overflow:hidden;
    white-space:nowrap;
    background:#000;
    border-top:2px solid #111;
    border-bottom:2px solid #111;
    padding:12px 0;
}

.ticker{
    display:inline-block;
    padding-left:100%;
    animation:scroll 35s linear infinite;
    font-size:42px;
    font-weight:bold;
}

.item{
    margin-right:70px;
}

.up{
    color:#00ff66;
}

.down{
    color:#ff3333;
}

.neutral{
    color:#ffffff;
}

@keyframes scroll{
    0%{
        transform:translateX(0);
    }

    100%{
        transform:translateX(-100%);
    }
}

</style>
</head>

<body>

<div class="ticker-wrap">
<div class="ticker" id="ticker">

<span class="neutral">LOADING LIVE MARKET DATA...</span>

</div>
</div>

<script>

const API_KEY = "ab9ad4a5484e41feb2e148d8322fe4b5"; 
// Replace with your TwelveData API key

async function getMarketData(){

try{

const url =
"https://api.twelvedata.com/price?symbol=XAU/USD,XAG/USD,EUR/USD,GBP/USD,USD/JPY,AUD/USD,BTC/USD,ETH/USD&apikey=" + API_KEY;

const response = await fetch(url);

const data = await response.json();

function format(symbol,label){

if(!data[symbol]){

return `<span class="item neutral">${label}: N/A</span>`;

}

let price = parseFloat(data[symbol].price);

return `<span class="item up">${label}: ${price}</span>`;

}

document.getElementById("ticker").innerHTML =

format("XAU/USD","GOLD") +
format("XAG/USD","SILVER") +
format("EUR/USD","EURUSD") +
format("GBP/USD","GBPUSD") +
format("USD/JPY","USDJPY") +
format("AUD/USD","AUDUSD") +
format("BTC/USD","BTCUSD") +
format("ETH/USD","ETHUSD");

}
catch(error){

document.getElementById("ticker").innerHTML =
'<span class="down">LIVE DATA CONNECTION ERROR</span>';

console.log(error);

}

}

getMarketData();

setInterval(getMarketData,5000);

</script>

</body>
</html>
